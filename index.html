<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台南行｜日程表</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            muji: {
              bg: '#f7f6f2',
              card: '#ffffff',
              text: '#33322e',
              muted: '#8a867d',
              border: '#e6e4df',
              accent: '#7f1d1d'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f7f6f2; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
    [v-cloak] { display: none; }
    .img-zoom-enter-active, .img-zoom-leave-active { transition: opacity 0.3s ease; }
    .img-zoom-enter-from, .img-zoom-leave-to { opacity: 0; }
  </style>
</head>
<body class="text-muji-text antialiased">

  <div id="app" v-cloak class="max-w-md mx-auto bg-muji-bg min-h-screen relative shadow-sm">
    
    <header class="bg-muji-card px-6 pt-12 pb-4 sticky top-0 z-10 border-b border-muji-border">
      <h1 class="text-2xl font-medium tracking-widest text-center">行程計畫</h1>
      <div class="flex justify-between mt-8">
        <button v-for="(day, index) in itinerary" :key="index" @click="activeTab = index"
          class="flex-1 pb-3 text-center transition-all text-sm tracking-wide"
          :class="activeTab === index ? 'text-muji-text border-b-2 border-muji-accent font-medium' : 'text-muji-muted border-b-2 border-transparent'">
          {{ day.date }} ({{ day.dayOfWeek }})
        </button>
      </div>
    </header>

    <main class="px-6 py-8">
      <div v-for="(event, index) in currentDayEvents" :key="index" class="relative pl-6 pb-8 last:pb-0">
        <div class="absolute left-0 top-1 bottom-0 w-px bg-muji-border"></div>
        <div class="absolute left-[-4px] top-[6px] w-[9px] h-[9px] rounded-full"
             :class="event.isLocation ? 'bg-muji-text' : 'bg-muji-border'"></div>

        <div class="bg-muji-card border border-muji-border p-4 rounded-sm shadow-sm flex flex-col gap-2">
          
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 text-muji-muted text-xs font-medium tracking-wider">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              {{ event.time }}
            </div>
            <button v-if="event.isLocation" @click="openMap(event.mapQuery)"
              class="w-7 h-7 flex items-center justify-center rounded border border-muji-border text-muji-text bg-muji-bg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              </svg>
            </button>
          </div>

          <h2 class="text-base font-medium">{{ event.title }}</h2>

          <button 
            v-if="event.notes || (event.images && event.images.length > 0) || event.igVideo" 
            @click="event.isOpen = !event.isOpen"
            class="mt-1 text-xs text-muji-muted flex items-center gap-1 hover:text-muji-text transition-colors w-max"
          >
            <span>{{ event.isOpen ? '收起詳細內容' : '展開備註與影音' }}</span>
            <svg :class="{'rotate-180': event.isOpen}" class="w-3 h-3 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          
          <div v-show="event.isOpen" class="mt-2 pt-3 border-t border-muji-border flex flex-col gap-3">
            <div v-if="event.notes" class="bg-muji-bg p-3 rounded-sm border-l-2 border-muji-muted">
              <p class="text-xs text-muji-text leading-relaxed whitespace-pre-wrap">{{ event.notes }}</p>
            </div>
            
            <div v-if="event.images && event.images.length > 0" class="flex flex-col gap-2">
              <img v-for="(img, imgIndex) in event.images" :key="imgIndex" :src="img" 
                   @click="zoomImg(img)"
                   class="w-full h-auto block object-cover rounded-sm border border-muji-border cursor-zoom-in" 
                   loading="lazy" alt="行程圖片">
            </div>

            <div v-if="event.igVideo" class="w-full flex justify-center mt-1">
              <iframe :src="event.igVideo" class="w-full h-[540px] rounded-sm border border-muji-border" frameborder="0" scrolling="no" allowtrans
