<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>台南行｜日程表</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            muji: {
              bg: '#f7f6f2',
              card: '#ffffff',
              text: '#33322e',
              muted: '#8a867d',
              border: '#e6e4df',
              accent: '#7f1d1d'
            }
          }
        }
      }
    }
  </script>
  <style>
    body { background-color: #f7f6f2; -webkit-tap-highlight-color: transparent; font-family: 'Noto Sans TC', sans-serif; }
    [v-cloak] { display: none; }
    .img-zoom-enter-active, .img-zoom-leave-active { transition: opacity 0.3s ease; }
    .img-zoom-enter-from, .img-zoom-leave-to { opacity: 0; }
  </style>
</head>
<body class="text-muji-text antialiased">

  <div id="app" v-cloak class="max-w-md mx-auto bg-muji-bg min-h-screen relative shadow-sm">
    
    <header class="bg-muji-card px-6 pt-12 pb-4 sticky top-0 z-10 border-b border-muji-border">
      <h1 class="text-2xl font-medium tracking-widest text-center">行程計畫</h1>
      <div class="flex justify-between mt-8">
        <button v-for="(day, index) in itinerary" :key="index" @click="activeTab = index"
          class="flex-1 pb-3 text-center transition-all text-sm tracking-wide"
          :class="activeTab === index ? 'text-muji-text border-b-2 border-muji-accent font-medium' : 'text-muji-muted border-b-2 border-transparent'">
          {{ day.date }} ({{ day.dayOfWeek }})
        </button>
      </div>
    </header>

    <main class="px-6 py-8">
      <div v-for="(event, index) in currentDayEvents" :key="index" class="relative pl-6 pb-8 last:pb-0">
        <div class="absolute left-0 top-1 bottom-0 w-px bg-muji-border"></div>
        <div class="absolute left-[-4px] top-[6px] w-[9px] h-[9px] rounded-full"
             :class="event.isLocation ? 'bg-muji-text' : 'bg-muji-border'"></div>

        <div class="bg-muji-card border border-muji-border p-4 rounded-sm shadow-sm flex flex-col gap-2">
          
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2 text-muji-muted text-xs font-medium tracking-wider">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
              </svg>
              {{ event.time }}
            </div>
            <button v-if="event.isLocation" @click="openMap(event.mapQuery)"
              class="w-7 h-7 flex items-center justify-center rounded border border-muji-border text-muji-text bg-muji-bg">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
              </svg>
            </button>
          </div>

          <h2 class="text-base font-medium">{{ event.title }}</h2>

          <button 
            v-if="event.notes || (event.images && event.images.length > 0)" 
            @click="event.isOpen = !event.isOpen"
            class="mt-1 text-xs text-muji-muted flex items-center gap-1 hover:text-muji-text transition-colors w-max"
          >
            <span>{{ event.isOpen ? '收起詳細內容' : '展開備註與圖片' }}</span>
            <svg :class="{'rotate-180': event.isOpen}" class="w-3 h-3 transition-transform duration-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
          </button>
          
          <div v-show="event.isOpen" class="mt-2 pt-3 border-t border-muji-border flex flex-col gap-3">
            <div v-if="event.notes" class="bg-muji-bg p-3 rounded-sm border-l-2 border-muji-muted">
              <p class="text-xs text-muji-text leading-relaxed whitespace-pre-wrap">{{ event.notes }}</p>
            </div>
            
            <div v-if="event.images && event.images.length > 0" class="flex flex-col gap-2">
              <img v-for="(img, imgIndex) in event.images" :key="imgIndex" :src="img" 
                   @click="zoomImg(img)"
                   class="w-full h-auto block object-cover rounded-sm border border-muji-border cursor-zoom-in" 
                   loading="lazy" alt="行程圖片">
            </div>
          </div>
        </div>
      </div>
    </main>

    <transition name="img-zoom">
      <div v-if="zoomedImg" @click="zoomedImg = null" class="fixed inset-0 z-50 bg-black/90 flex items-center justify-center p-4">
        <img :src="zoomedImg" class="max-w-full max-h-full object-contain shadow-2xl" alt="放大圖片">
        <button class="absolute top-6 right-6 text-white/70">
          <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </transition>
  </div>

  <script>
    const { createApp, ref, computed } = Vue
    createApp({
      setup() {
        const activeTab = ref(0)
        const zoomedImg = ref(null)
        
        const itinerary = ref([
          {
            date: '4/24', dayOfWeek: '五',
            events: [
              { time: '18:00', title: '下班回家', isLocation: false },
              { time: '19:20', title: '騎車前往台南市區', isLocation: false },
              { 
                time: '20:00', title: 'Eureka Bar', isLocation: true, mapQuery: 'Eureka Bar 台南',
                notes: '已訂位，預計喝1-2杯前往下一間，推薦「女士優先」豐富果香，酒感不重。',
                images: [
                  'https://disk.sharelife.tw/gallery/225594-162232/4452121222185915.jpg',
                  'https://disk.sharelife.tw/gallery/225594-162957/8095201222162314.jpg',
                  'https://disk.sharelife.tw/gallery/225594-162961/3f08201222442314.jpg'
                ],
                isOpen: false 
              },
              { 
                time: '22:00', title: 'Bar often 常酒', isLocation: true, mapQuery: 'Bar often 常酒 台南', 
                notes: '已訂位，距離晚餐有一小段時間，建議點一些食物搭配，推薦「馬賽虱目魚皮湯」、「常酒」木質調茶酒搭配西洋梨。',
                images: [
                  'https://flyingclub-prod.s3.ap-northeast-1.amazonaws.com/rtbvnbu95388c4wn0ivfsj2f2d8s?response-content-disposition=inline%3B%20filename%3D%22DSC_e%253F%253F%253Fa%253F%253F%253Fa%253F%253F%253Fae%253F%253F%20-%20c%253F%253F%253Fa%253F%253F%253Fa%253F%253F%253F.jpg%22%3B%20filename%2A%3DUTF-8%27%27DSC_e%25CC%2581%25C2%2596%25C2%2580a%25CC%258A%25C2%258F%25C2%25A3a%25CC%258A%25C2%2585%25C2%25A8%25C3%25A6%25C2%2599%25C2%25AF%2520-%2520c%25CC%25A7%25C2%258E%25C2%258Ba%25CC%2588%25C2%25B8%25C2%25ADa%25CC%258A%25C2%25BB%25C2%25B7.jpg&response-content-type=image%2Fjpeg&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=AKIAS6AM7BBA7HWBTVLM%2F20260421%2Fap-northeast-1%2Fs3%2Faws4_request&X-Amz-Date=20260421T044358Z&X-Amz-Expires=86400&X-Amz-SignedHeaders=host&X-Amz-Signature=5a99647c856c035d00224121e2ede7894bfc8eebb3391913af2e895a457bf1ec',
                  'https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ5fO_AA41lkR1RGUQexuj4Usm-JRvs3GRD7oQmOAYixCfYJ77L16MMXAU&s=10'
                ],
                isOpen: false
              },
              { 
                time: '23:00', title: '阿杰溫體牛肉湯', isLocation: true, mapQuery: '阿杰溫體牛肉湯 台南', 
                notes: '直接點上等部位大碗牛肉湯！',
                images: [
                  'https://letsplay.tw/wp-content/uploads/2024/12/1P6A6173.jpg',
                  'https://letsplay.tw/wp-content/uploads/2024/12/1P6A6174.jpg'
                ],
                isOpen: false 
              },
              { time: '23:30', title: '搭車返家', isLocation: false },
              { time: '24:00', title: '溫暖的家', isLocation: false }
            ]
          },
          {
            date: '4/25', dayOfWeek: '六',
            events: [
              { time: '10:00', title: '起床', isLocation: false },
              { 
                time: '10:20', title: '好鄰．食作', isLocation: true, mapQuery: '好鄰．食作 台南',
                notes: '已訂位，是靠近家裡的早餐店。',
                images: [
                  'https://ppt.cc/f8RgSx@.jpg?1776758119',
                  'https://ppt.cc/fsQbox@.jpg?1776758362',
                  'https://ppt.cc/feV2Cx@.jpg?1776758403'
                ],
                isOpen: false
              },
              { 
                time: '12:00', title: '前往官田遊客中心', isLocation: false,
                images: ['https://ppt.cc/fRiwSx@.jpg?1776758543'],
                isOpen: false
              },
              { time: '13:00', title: '抵達會場', isLocation: true, mapQuery: '官田遊客中心' },
              { 
                time: '14:00', title: '逛市集、主舞台表演', isLocation: false,
                images: [
                  'https://ppt.cc/faZskx@.jpg?1776758604',
                  'https://ppt.cc/fyrEex@.jpg?1776758631'
                ],
                isOpen: false
              },
              { 
                time: '18:30', title: '熱氣球光雕秀', isLocation: false,
                images: ['https://www.siraya-nsa.gov.tw/image/87937/1024x768'],
                isOpen: false
              },
              { time: '19:30', title: '離開會場', isLocation: false },
              { 
                time: '21:00', title: '山川序足體養生會館（民生旗艦館）', isLocation: true, mapQuery: '山川序足體養生會館 民生旗艦館',
                notes: '走了一天，來個身心靈放鬆：）',
                images: ['https://ppt.cc/fv5oox@.jpg?1776750483'],
                isOpen: false
              },
              { time: '22:30', title: '溫暖的家', isLocation: false }
            ]
          },
          {
            date: '4/26', dayOfWeek: '日',
            events: [
              { time: '09:00', title: '起床', isLocation: false },
              { time: '10:20', title: '出門上課', isLocation: false },
              { time: '11:00', title: 'B.P.Y. 220 台南旗艦店', isLocation: true, mapQuery: 'B.P.Y. 220 台南旗艦店' },
              { time: '12:00', title: '下課', isLocation: false },
              { time: '13:00', title: 'L’Amour', isLocation: true, mapQuery: 'L’Amour 台南' },
              { time: '15:00', title: '誠品生活台南店', isLocation: true, mapQuery: '誠品生活台南店' },
              { time: '19:30', title: '台南運河水岸燈光秀', isLocation: true, mapQuery: '台南運河' },
              { time: '20:00', title: '返家', isLocation: false },
              { time: '20:40', title: '溫暖的家', isLocation: false }
            ]
          }
        ])

        const currentDayEvents = computed(() => itinerary.value[activeTab.value].events)
        const openMap = (q) => window.open('https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(q), '_blank')
        const zoomImg = (url) => zoomedImg.value = url

        return { activeTab, itinerary, currentDayEvents, openMap, zoomedImg, zoomImg }
      }
    }).mount('#app')
  </script>
</body>
</html>
